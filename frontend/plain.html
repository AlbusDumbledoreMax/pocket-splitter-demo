<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pocket Demo + Calculator</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 900px;
        margin: 20px auto;
      }
      h1,
      h2,
      h3 {
        margin-top: 24px;
      }
      .balances {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .balance {
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 8px;
      }
      .balance.owes {
        background: #fff3cd;
      }
      .balance.owed {
        background: #d1ecf1;
      }
      button {
        padding: 8px 16px;
        margin-top: 10px;
      }
      input {
        padding: 6px;
        margin: 4px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        padding: 6px 8px;
        border: 1px solid #ddd;
        text-align: left;
      }
      .flex-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .tag {
        font-size: 12px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #eee;
      }
      .result-box {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 6px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>💰 Pocket – Demo</h1>

    <!-- DEMO123 group section -->
    <h2>Group demo (DEMO123)</h2>
    <div>
      <label>Invite code:</label>
      <input id="inviteCode" value="DEMO123" />
      <button onclick="loadGroup()">Load group</button>
    </div>

    <div id="groupInfo" style="margin-top: 20px"></div>

    <div class="balances" id="balancesBox" style="display: none">
      <h3>Balances</h3>
      <div id="balances"></div>
      <button onclick="settle()">Settle up</button>
      <button onclick="downloadCsv()">Download CSV</button>
    </div>

    <h3>Add simple demo expense</h3>
    <button onclick="addDemoExpense()">
      Add demo expense (Alice pays 1200, 40/30/30)
    </button>

    <hr />

    <!-- Calculator section -->
    <h2>What‑if Calculator (any N people)</h2>

    <div class="flex-row">
      <div>
        <label>Total amount:</label>
        <input id="calcTotal" type="number" value="100" />
      </div>
      <div>
        <label>Number of people:</label>
        <input id="calcN" type="number" value="3" min="1" />
        <button onclick="buildCalcRows()">Apply</button>
      </div>
      <div>
        <label>
          <input id="calcEqual" type="checkbox" checked />
          Equal split
        </label>
        <span class="tag">Uncheck to use ratio in "Share"</span>
      </div>
    </div>

    <div id="calcTableWrap"></div>

    <button onclick="runCalculator()">Calculate</button>

    <div id="calcResults" style="margin-top: 15px"></div>

    <script>
      const API = "http://127.0.0.1:8000"; // backend URL

      // ---------- DEMO123 logic ----------
      let currentGroup = null;

      async function loadGroup() {
        const code = document.getElementById("inviteCode").value.trim();
        try {
          const res = await fetch(`${API}/group/${code}`);
          if (!res.ok) throw new Error("Group not found");
          const data = await res.json();
          // set state and update UI
          currentGroup = data;
          document.getElementById("groupInfo").innerText =
            `Group: ${data.name} (id=${data.id}) with members: ` +
            data.members.map((m) => m.name).join(", ");
          await loadBalances();
        } catch (e) {
          alert("Error loading group: " + e.message);
        }
      }

      async function loadBalances() {
        if (!currentGroup) return;
        const res = await fetch(`${API}/group/${currentGroup.id}/balances`);
        const data = await res.json();
        const container = document.getElementById("balances");
        container.innerHTML = "";
        data.forEach((b) => {
          const div = document.createElement("div");
          div.className = "balance " + (b.balance > 0 ? "owes" : "owed");
          div.textContent =
            `${b.name}: ₹${Math.abs(b.balance).toFixed(0)} ` +
            (b.balance > 0 ? "owes" : "is owed");
          container.appendChild(div);
        });
        document.getElementById("balancesBox").style.display = "block";
      }

      async function addDemoExpense() {
        if (!currentGroup) {
          alert("Load DEMO123 first");
          return;
        }
        const members = currentGroup.members;
        if (members.length < 3) {
          alert("Demo expects 3 members");
          return;
        }
        const body = {
          paid_by: members[0].id,
          amount: 1200,
          description: "Dinner demo 40/30/30",
          splits: [
            { user_id: members[0].id, share: 0.4 },
            { user_id: members[1].id, share: 0.3 },
            { user_id: members[2].id, share: 0.3 },
          ],
        };
        const res = await fetch(`${API}/group/${currentGroup.id}/expense`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert("Error adding expense: " + (err.detail || res.statusText));
          return;
        }
        await loadBalances();
      }

      async function settle() {
        if (!currentGroup) return;
        const res = await fetch(`${API}/group/${currentGroup.id}/settle`, {
          method: "POST",
        });
        const data = await res.json();
        alert("Transactions:\n" + JSON.stringify(data.transactions, null, 2));
        await loadBalances();
      }

      function downloadCsv() {
        if (!currentGroup) {
          alert("Load DEMO123 first");
          return;
        }
        window.location.href = `${API}/group/${currentGroup.id}/transactions.csv`;
      }

      // ---------- Calculator UI ----------

      function buildCalcRows() {
        const n = parseInt(document.getElementById("calcN").value || "0", 10);
        const wrap = document.getElementById("calcTableWrap");
        if (n <= 0) {
          wrap.innerHTML = "";
          return;
        }

        let html = "<table><thead><tr>";
        html += "<th>#</th><th>Name</th><th>Paid</th><th>Share</th>";
        html += "</tr></thead><tbody>";

        for (let i = 0; i < n; i++) {
          html += `<tr>
            <td>${i + 1}</td>
            <td><input id="person_name_${i}" value="P${i + 1}" /></td>
            <td><input id="person_paid_${i}" type="number" value="0" /></td>
            <td><input id="person_share_${i}" type="number" value="1" /></td>
          </tr>`;
        }

        html += "</tbody></table>";
        wrap.innerHTML = html;
      }

      // default 3 rows
      buildCalcRows();

      async function runCalculator() {
        const total = parseFloat(
          document.getElementById("calcTotal").value || "0",
        );
        const n = parseInt(document.getElementById("calcN").value || "0", 10);
        const equal = document.getElementById("calcEqual").checked;

        if (!n || total <= 0) {
          alert("Enter total amount > 0 and at least 1 person");
          return;
        }

        const people = [];
        for (let i = 0; i < n; i++) {
          const name =
            document.getElementById(`person_name_${i}`)?.value || `P${i + 1}`;
          const paid = parseFloat(
            document.getElementById(`person_paid_${i}`)?.value || "0",
          );
          const shareVal = parseFloat(
            document.getElementById(`person_share_${i}`)?.value || "0",
          );

          people.push({
            user_id: i + 1,
            name,
            paid,
            share: equal ? 1 : shareVal,
          });
        }

        const body = {
          total_amount: total,
          equal_split: equal,
          people,
        };

        try {
          const res = await fetch(`${API}/calc/settle`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || res.statusText);
          }
          const data = await res.json();
          renderCalcResults(people, data);
        } catch (e) {
          alert("Calculator error: " + e.message);
        }
      }

      function renderCalcResults(people, data) {
        const box = document.getElementById("calcResults");
        const fair = data.fair_shares;
        const net = data.net;
        const txs = data.transactions || [];

        let html = "";

        html += '<div class="result-box">';
        html += "<h3>Fair share & net per person</h3>";
        html += "<ul>";
        people.forEach((p) => {
          const fairVal = fair[p.user_id] || 0;
          const netVal = net[p.user_id] || 0;
          const netLabel =
            netVal > 0
              ? `is owed ${netVal.toFixed(2)}`
              : netVal < 0
                ? `owes ${Math.abs(netVal).toFixed(2)}`
                : "is settled";
          html += `<li>${p.name}: fair share ${fairVal.toFixed(
            2,
          )}, paid ${p.paid.toFixed(2)}, ${netLabel}</li>`;
        });
        html += "</ul>";
        html += "</div>";

        html += '<div class="result-box">';
        html += "<h3>Minimal payments (netting)</h3>";
        if (!txs.length) {
          html += "<p>Everyone is already settled.</p>";
        } else {
          html += "<ul>";
          txs.forEach((t) => {
            const from =
              people.find((p) => p.user_id === t.from_user)?.name ||
              `P${t.from_user}`;
            const to =
              people.find((p) => p.user_id === t.to_user)?.name ||
              `P${t.to_user}`;
            html += `<li>${from} → ${to}: ${t.amount.toFixed(2)}</li>`;
          });
          html += "</ul>";
        }
        html += "</div>";

        box.innerHTML = html;
      }
    </script>
  </body>
</html>
